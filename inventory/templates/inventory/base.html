<!DOCTYPE html>
<html>
<head>
    <title>Assetra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Assetra</span>

    <div>
        <a href="/" class="btn btn-outline-light me-2">Home</a>
        <a href="/items/" class="btn btn-outline-light me-2">Items</a>

        {% if user.is_authenticated and user.groups.first.name == "Staff" %}
            <a href="/manage_requests/" class="btn btn-outline-light me-2">Manage Requests</a>
        {% endif %}
    </div>

    <div class="d-flex align-items-center">
        {% if user.is_authenticated %}
            <span class="text-light me-3">
                {{ user.username }} ({{ user.groups.first.name }})
            </span>
            <a href="/logout/" class="btn btn-outline-light">Logout</a>
        {% else %}
            <a href="/login/" class="btn btn-light">Login</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>
</body>
</html>
