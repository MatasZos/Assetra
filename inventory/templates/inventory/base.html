<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Assetra{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .navbar-brand { font-weight: 700; font-size: 1.4rem; letter-spacing: 1px; }
        .role-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
        .role-Student  { background: #0d6efd; color: #fff; }
        .role-Staff    { background: #198754; color: #fff; }
        .role-Manager  { background: #6f42c1; color: #fff; }
        .role-Admin    { background: #dc3545; color: #fff; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 12px; }
        .card-action { transition: transform 0.15s; cursor: pointer; }
        .card-action:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
        .table thead th { background-color: #212529; color: #fff; border: none; }
        .table tbody tr:hover { background-color: #f1f3f5; }
        footer { border-top: 1px solid #dee2e6; }
        .page-header { border-bottom: 2px solid #dee2e6; padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <a href="/" class="navbar-brand"><i class="bi bi-boxes me-2"></i>Assetra</a>
    <div class="d-flex align-items-center gap-3">
        {% if user.is_authenticated %}
            <span class="role-badge role-{{ user.groups.first.name }}">
                <i class="bi bi-person-fill me-1"></i>{{ user.username }} &middot; {{ user.groups.first.name }}
            </span>
            <form action="/logout/" method="post" class="m-0">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </form>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>{{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

<footer class="text-center mt-5 mb-3 text-muted">
    <small><i class="bi bi-boxes me-1"></i>Assetra &copy; 2026 &mdash; School Inventory Management</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
