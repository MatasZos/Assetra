{% extends "inventory/base.html" %}
{% block title %}Delete Item - Assetra{% endblock %}
{% block content %}
<a href="/items/" class="btn btn-secondary mb-3">← Back</a>
<h2>Delete Item</h2>

<div class="card p-4 mt-3" style="max-width: 500px;">
    <p>Are you sure you want to delete <strong>{{ item.name }}</strong>?</p>
    <p class="text-muted small">This will also remove all associated requests.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="/items/" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
