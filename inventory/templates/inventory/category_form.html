{% extends "inventory/base.html" %}
{% block title %}{{ action }} - Assetra{% endblock %}
{% block content %}
<a href="/categories/" class="btn btn-secondary mb-3">← Back to Categories</a>
<h2>{{ action }}</h2>

<div class="card p-4 mt-3" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label fw-bold">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small mt-1">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/categories/" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
